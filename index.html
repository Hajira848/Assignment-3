<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">

</head>

<body>


<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white py-3 border-bottom sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img src="assets/images/image4.png" alt="Logo" class="fixed-logo">
        </a>

        <div class="collapse navbar-collapse justify-content-end">
            <img src="assets/images/image2.png" alt="Sign In" class="fixed-btn-img">
        </div>
    </div>
</nav>

<main>

            <div class="row g-0">

                    <div class="hero-content">

                            Your mobile privacy is our mission

                        <p class="text-muted fs-5 my-4">
                            Think your phone has been hacked? Our trusted apps make it easy for you to scan, detect and remove threats from your iphone and Andriod devices.
                        </p>

                        <div class="d-flex flex-wrap gap-3">
                            <button class="btn btn-certo-yellow rounded-pill fw-bold">
                                Get Certo for iPhone →
                            </button>

                            <button class="btn btn-certo-outline rounded-pill fw-bold">
                                Get Certo for Android
                            </button>
                        </div>
                    </div>
                </div>

                <!-- RIGHT -->
                <div class="col-lg-6">
                    <div class="blue-frame">
                        <img src="assets/images/image1.png" alt="Hero Bg" class="hero-bg-image">

                        <div class="mobile-container">

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>
<!-- SECTION 2 -->
    <section class="section-yellow">
        <div class="sec2-container">

            <div class="sec2-heading">
                <img src="assets/images/image7.png" alt="Heading">

            <div class="sec2-cards-slider">
                <img src="assets/images/image6.png" alt="Testimonials" class="full-cards-img">
            </div>

            <div class="sec2-logos">
                <img src="assets/images/image5.png" alt="Featured Logos" class="clean-logos">
            </div>

        </div>
    </section>
    <!-- SECTION 3 -->
    <section class="mission-section">
        <div class="container">
            <div class="row align-items-center">

                <div class="col-lg-6">
                    <div class="mission-text-wrapper">
                        <img src="assets/images/image9.png" alt="Mission Text" class="mission-img-text">
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="mission-visual">
                        <img src="assets/images/image8.png" alt="Woman using phone" class="mission-person-img">
                    </div>
                </div>

            </div>
        </div>
    </section>
        <!-- SECTION 4 -->
    <section class="spyware-full-blue">
        <div class="container">

            <div class="spy-header-row">
                <img src="assets/images/image10.png" alt="Heading Text" class="img-10-full">
            </div>

            <div class="spy-card-row">
                <img src="assets/images/image11.png" alt="Features Grid" class="img-11-full">
            </div>

        </div>
    </section>

      <!-- SECTION 5 -->
<section id="help-support-new" class="section-white-bg">

        <div class="row align-items-center justify-content-between">
            
            <div class="col-lg-5">
                <div class="yellow-card-wrapper">
                    <img src="assets/images/image12.png" alt="About Certo" class="help-card-img">
                </div>
            </div>

            <div class="col-lg-5">
                <div class="help-center-content">
       
                    <h2 class="help-center-title">Help Center</h2>

                    </p>
                    <a href="#" class="btn-help-center">Visit Help Centre</a>
                </div>
            </div>

        </div>
    </div> 

</section>
<!-- SECTION 6 -->
<section class="cta-gradient-section">
    <div class="container text-center">
        
        <div class="cta-text-wrapper">
            <img src="assets/images/image13.png" alt="Is someone spying on your phone?" class="img-14-cta">
        </div>
